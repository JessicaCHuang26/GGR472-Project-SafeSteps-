<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SafeSteps Toronto</title>

<!-- MAPBOX -->
<script src="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.10.0/mapbox-gl.css" rel="stylesheet"/>

<!-- GEOCODER -->
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>
<link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css"/>

<!-- Turf -->
<script src="https://unpkg.com/@turf/turf@7.2.0/turf.min.js"></script>

<link rel="stylesheet" href="style.css" />
</head>

<body>

<div id="controls">

  <!-- Language toggle -->
  <div id="top-bar">
    <div id="lang-toggle">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="fr">FR</button>
    </div>
  </div>

  <!-- Search card -->
  <div id="search-card">
    <div id="search-icons">
      <span id="icon-circle"></span>
      <span id="icon-dots">&#8942;</span>
      <span id="icon-pin">&#9679;</span>
    </div>
    <div id="search-inputs">
      <div id="geocoder-start"></div>
      <div id="input-divider"></div>
      <div id="geocoder-end"></div>
    </div>
    <div id="search-btns">
      <button id="gps-btn" title="Use my location">&#x1F4CD;</button>
      <button id="swap-btn" title="Swap">&#8693;</button>
    </div>
  </div>

  <!-- Popular destinations -->
  <div id="landmarks-panel">
    <div class="landmarks-label" data-i18n="landmarks">Popular Destinations</div>
    <div id="landmarks-grid">
      <button class="landmark-btn" data-lng="-79.3871" data-lat="43.6426">CN Tower</button>
      <button class="landmark-btn" data-lng="-79.3832" data-lat="43.6452">Union Station</button>
      <button class="landmark-btn" data-lng="-79.3803" data-lat="43.6545">Eaton Centre</button>
      <button class="landmark-btn" data-lng="-79.3947" data-lat="43.6677">ROM</button>
      <button class="landmark-btn" data-lng="-79.4007" data-lat="43.6543">Kensington Market</button>
      <button class="landmark-btn" data-lng="-79.3594" data-lat="43.6503">Distillery District</button>
      <button class="landmark-btn" data-lng="-79.3716" data-lat="43.6488">St. Lawrence Market</button>
      <button class="landmark-btn" data-lng="-79.4637" data-lat="43.6468">High Park</button>
    </div>
  </div>

  <!-- Route toggle -->
  <div id="route-toggle">
    <button class="toggle-btn active" data-mode="both" data-i18n="both">Both</button>
    <button class="toggle-btn" data-mode="fastest" data-i18n="fastest">Fastest</button>
    <button class="toggle-btn" data-mode="safest" data-i18n="safest">Safest</button>
  </div>

  <!-- Safety warning -->
  <div id="safety-warning" style="display:none" data-i18n="safetyWarning">
    ⚠️ Route passes through a high-crime area. Stay alert.
  </div>

  <div id="status" style="display:none"></div>

  <div id="info" style="display:none">
    <div id="fastest-row" class="route-row">
      <span class="swatch" style="background:#1976d2"></span>
      <b data-i18n="fastest">Fastest</b> &mdash; <span id="fastest-time">--</span>
    </div>
    <div id="safest-row" class="route-row">
      <span class="swatch" style="background:#388e3c"></span>
      <b data-i18n="safest">Safest</b> &mdash; <span id="safest-time">--</span>
      <div class="route-sub"><span id="safest-reduction"></span></div>
    </div>
    <div id="same-route-note" style="display:none" class="route-sub" data-i18n="sameRoute">
      This is the fastest and safest route available.
    </div>
  </div>

</div>

<!-- Legend -->
<div id="legend">
  <div class="legend-title" data-i18n="legendTitle">Crime Risk Level</div>
  <div class="legend-row"><span class="legend-swatch" style="background:#fff5f0;border-color:#ddd"></span><span data-i18n="low">Low Risk</span></div>
  <div class="legend-row"><span class="legend-swatch" style="background:#fb6a4a"></span><span data-i18n="moderate">Moderate Risk</span></div>
  <div class="legend-row"><span class="legend-swatch" style="background:#de2d26"></span><span data-i18n="high">High Risk</span></div>
  <div class="legend-row"><span class="legend-swatch" style="background:#67000d"></span><span data-i18n="danger">Danger</span></div>
  <div class="legend-divider"></div>
  <div class="legend-row legend-toggle-row">
    <label class="layer-toggle">
      <input type="checkbox" id="police-toggle" checked>
      <span class="toggle-track"></span>
    </label>
    <span class="legend-circle" style="background:#1565c0"></span>
    <span data-i18n="policeStation">Police station</span>
  </div>
  <div class="legend-row"><span class="legend-line" style="background:#1976d2"></span><span data-i18n="fastestRoute">Fastest route</span></div>
  <div class="legend-row"><span class="legend-line" style="background:#388e3c"></span><span data-i18n="safestRoute">Safest route</span></div>
</div>

<div id="map" class="map"></div>

<script src="script.js"></script>

</body>
</html>
